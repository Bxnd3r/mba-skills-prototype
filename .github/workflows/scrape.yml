name: Daily MBA Market Scrape

on:
  schedule:
    - cron: '0 2 * * *' # Runs at 2:00 AM UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 👇 THIS IS THE MISSING KEY PERMISSION
    permissions:
      contents: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright google-generativeai
          playwright install chromium

      # Use the -u flag to see logs instantly!
      - name: Run Scraper
        env: 
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }} # <--- THIS MUST BE HERE
        run: python -u job_pulse.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # We add all json files
          git add *.json
          # The '|| echo' part prevents it from crashing if there are no new jobs
          git commit -m "Automated Market Data Update" || echo "No changes to commit"
          git push
