name: AUDIT NEW SCHOOL URL

on:
  workflow_dispatch:
    inputs:
      school_url:
        description: 'Target Catalog URL'
        required: true
      school_name:
        description: 'School Name'
        required: true

jobs:
  browser_audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install
        run: |
          pip install playwright google-generativeai beautifulsoup4 requests
          playwright install chromium
      - name: Run
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u master_audit.py --mode url --input "${{ inputs.school_url }}" --name "${{ inputs.school_name }}"
      - name: Save
        run: |
          git config --global user.name "URL Bot"
          git config --global user.email "bot@github.com"
          git pull --rebase origin main
          git add registry.json *_audit.json
          git commit -m "URL Audit: ${{ inputs.school_name }}" || echo "No changes"
          git push origin main
