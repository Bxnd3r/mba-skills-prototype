name: COLLECT SCHOOL URL

on:
  workflow_dispatch:
    inputs:
      school_url:
        description: 'Target Catalog URL'
        required: true
      school_name:
        description: 'School Name'
        required: true

jobs:
  url_collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Scraper Tools
        # We only need Playwright now. No AI.
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Collector
        # Runs the new school_collector.py in URL mode
        run: python -u school_collector.py --mode url --input "${{ inputs.school_url }}" --name "${{ inputs.school_name }}"

      - name: Save to Repo
        run: |
          git config --global user.name "URL Collector Bot"
          git config --global user.email "bot@github.com"
          
          # Pull latest changes to avoid conflicts
          git pull --rebase origin main
          
          # Add the new data folder
          git add raw_school_data/*.json
          
          git commit -m "Collected URL: ${{ inputs.school_name }}" || echo "No changes"
          git push origin main
