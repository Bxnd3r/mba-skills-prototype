name: COLLECT SCHOOL TEXT

on:
  workflow_dispatch:
    inputs:
      school_name:
        description: 'School Name (e.g. Chicago Booth)'
        required: true

jobs:
  collect_text:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      # No pip install needed! (Standard library only)

      - name: Run Collector
        run: python -u school_collector.py --mode text --name "${{ inputs.school_name }}"

      - name: Save to Repo
        run: |
          git config --global user.name "Collector Bot"
          git config --global user.email "bot@github.com"
          
          # We add the new folder "raw_school_data"
          git add raw_school_data/*.json pending_audit.txt
          git commit -m "Collected: ${{ inputs.school_name }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
