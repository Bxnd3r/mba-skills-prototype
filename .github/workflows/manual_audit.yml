name: Audit New School

on:
  workflow_dispatch:
    inputs:
      school_name:
        description: 'School Display Name (e.g., NYU Stern)'
        required: true

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install google-generativeai
      - name: Run Master Audit
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python -u master_audit.py "${{ inputs.school_name }}"
      - name: Save & Commit Results
        run: |
          git config --global user.name "Audit Bot"
          git config --global user.email "bot@github.com"
          git pull --rebase origin main
          git add registry.json *_audit.json
          git commit -m "Audit complete for ${{ inputs.school_name }}" || echo "No changes"
          git push origin main
