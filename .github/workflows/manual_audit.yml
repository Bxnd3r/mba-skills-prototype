name: Audit New School

on:
  workflow_dispatch: # This creates the "Run Workflow" button
    inputs:
      school_url:
        description: 'School Catalog URL (e.g., https://catalog.yale.edu...)'
        required: true
      school_name:
        description: 'School Display Name (e.g., Yale School of Management)'
        required: true

jobs:
  audit:
    runs-on: ubuntu-latest
    # CRITICAL: Give the robot permission to write files!
    permissions:
      contents: write 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Use the official token

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright google-generativeai requests beautifulsoup4
          playwright install chromium

      - name: Run Master Audit
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: |
          python master_audit.py "${{ inputs.school_url }}" "${{ inputs.school_name }}"

      - name: Commit and Push
        run: |
          git config --global user.name "Audit Bot"
          git config --global user.email "bot@github.com"
          git add .
          # The commit might fail if there are no changes, so we add "|| echo..."
          git commit -m "Added ${{ inputs.school_name }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
