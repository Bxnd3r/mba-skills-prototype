<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Skills Gap Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1150px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 5px; }
        
        /* Search UI */
        .search-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; gap: 15px; width: 100%; }
        .search-box { position: relative; width: 100%; max-width: 600px; }
        input { width: 100%; padding: 14px 20px; font-size: 16px; border-radius: 12px; border: 2px solid #eee; transition: 0.2s; outline: none; }
        input:focus { border-color: #007bff; }
        .results-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; border-radius: 0 0 12px 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .results-list div { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f8f9fa; font-size: 14px; }
        .results-list div:hover { background-color: #f0f7ff; }

        .school-tags { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; height: 40px; }
        .school-tag { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .color-box { width: 20px; height: 20px; border-radius: 4px; margin-right: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .color-box::after { content: '×'; color: white; font-size: 16px; font-weight: bold; opacity: 0; position: absolute; }
        .color-box:hover::after { opacity: 1; }

        .main-visual { display: flex; gap: 30px; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; }
        .chart-wrapper { position: relative; height: 450px; flex: 2; min-width: 400px; }
        .info-panel { flex: 1; min-width: 280px; background: #fcfcfc; padding: 20px; border-radius: 12px; border: 1px solid #eee; font-size: 13px; }
        
        /* Inventory List */
        .inventory-section { margin-top: 10px; border-top: 2px solid #eee; padding-top: 20px; width: 100%; }
        .course-item { background: #fafafa; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; padding: 12px; }
        summary { cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; list-style: none; outline: none; align-items: center; }
        .course-score-badge { background: #eee; color: #555; padding: 3px 10px; border-radius: 12px; font-size: 11px; }
        .course-details { margin-top: 15px; font-size: 14px; color: #444; line-height: 1.6; padding: 15px; background: #fff; border-radius: 8px; border-left: 4px solid #007bff; }
    </style>
</head>
<body>
    <div style="color:#666; font-size:13px; font-weight:500; margin-bottom:5px; text-transform:uppercase; text-align:center;">MBA Skills Gap Analyzer</div>

    <div class="container">
        <div class="search-area">
            <div class="search-box">
                <input type="text" id="schoolSearch" placeholder="Loading schools..." disabled oninput="showResults()">
                <div id="resultsList" class="results-list"></div>
            </div>
            <div id="schoolTags" class="school-tags"></div>
        </div>

        <div class="main-visual">
            <div class="chart-wrapper">
                <canvas id="myRadarChart"></canvas>
            </div>
            <div class="info-panel">
                <h4>Analysis Status</h4>
                <div id="analysisStatus" style="color:#666; font-style:italic;">Select a school to see status.</div>
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <div style="font-size:12px; color:#888;">
                    <strong>Note:</strong> If the chart is empty, the school has been collected but not yet audited by AI.
                </div>
            </div>
        </div>

        <div class="inventory-section">
            <h3 id="inventoryTitle">Course Inventory</h3>
            <div id="courseList" style="color:#666; font-style:italic;">Add a school to view curriculum...</div>
        </div>
    </div>

    <script>
        const labels = ['Decision_Making', 'Human_Capital', 'Strategy_Innovation', 'Task_Environment', 'Admin_Control', 'Logistics_Tech'];
        const baselines = { national: [3.5, 4.8, 4.0, 5.0, 4.5, 4.2] };
        let schoolsDB = [];
        let selectedSchools = [];

        const ctx = document.getElementById('myRadarChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{ label: 'Market Demand', data: baselines.national, backgroundColor: 'rgba(0,0,0,0.05)', borderColor: 'rgba(0,0,0,0.2)', borderDash: [5, 5], pointRadius: 0, fill: true }]
            },
            options: { maintainAspectRatio: false, scales: { r: { suggestedMin: 0, suggestedMax: 5 } } }
        });

        window.onload = async function() {
            try {
                const res = await fetch('registry.json');
                schoolsDB = await res.json();
                document.getElementById('schoolSearch').disabled = false;
                document.getElementById('schoolSearch').placeholder = "Search for a school...";
            } catch (e) { console.error("Registry error", e); }
        };

        function showResults() {
            const query = document.getElementById('schoolSearch').value.toLowerCase();
            const list = document.getElementById('resultsList');
            list.innerHTML = "";
            if (!query) { list.style.display = "none"; return; }
            
            const filtered = schoolsDB.filter(s => s.name.toLowerCase().includes(query) && !selectedSchools.find(sel => sel.id === s.id));
            filtered.forEach(s => {
                const div = document.createElement('div');
                div.innerText = s.name;
                div.onclick = () => selectSchool(s);
                list.appendChild(div);
            });
            list.style.display = filtered.length ? "block" : "none";
        }

        async function selectSchool(school) {
            if (selectedSchools.length >= 3) return;
            
            try {
                // Determine path: Check if full path is in registry, else fallback
                const path = school.audit_file.startsWith('raw_school_data') ? school.audit_file : `raw_school_data/${school.audit_file}`;
                const res = await fetch(path);
                const data = await res.json();
                const courses = data.curriculum || data; // Handle both formats

                // CHECK: Is this raw data or audited data?
                let isAudited = false;
                let scores = [0,0,0,0,0,0];
                
                // Try to calculate scores if they exist
                let scoredCount = 0;
                let totals = { "Decision_Making": 0, "Human_Capital": 0, "Strategy_Innovation": 0, "Task_Environment": 0, "Admin_Control": 0, "Logistics_Tech": 0 };
                
                courses.forEach(c => {
                    if (c.skills) {
                        isAudited = true;
                        scoredCount++;
                        labels.forEach(l => totals[l] += (c.skills[l] || 0));
                    }
                });

                if (isAudited && scoredCount > 0) {
                    scores = labels.map(l => (totals[l] / scoredCount).toFixed(1));
                    document.getElementById('analysisStatus').innerHTML = `<span style="color:green">✅ Audit Complete (${scoredCount} courses scored)</span>`;
                } else {
                    document.getElementById('analysisStatus').innerHTML = `<span style="color:orange">⏳ Raw Data Only (Waiting for AI Analysis)</span>`;
                }

                school.data = scores;
                selectedSchools.push(school);
                
                myChart.data.datasets.push({
                    id: school.id,
                    label: school.name,
                    data: scores,
                    backgroundColor: school.color.replace('1)', '0.2)'),
                    borderColor: school.color,
                    pointRadius: 4,
                    fill: true
                });
                myChart.update();
                
                populateInventory(school.name, courses);
                updateTags();
                document.getElementById('schoolSearch').value = "";
                document.getElementById('resultsList').style.display = "none";

            } catch (e) {
                console.error(e);
                alert("Could not load data for " + school.name);
            }
        }

        function populateInventory(schoolName, courses) {
            const list = document.getElementById('courseList');
            list.innerHTML = `<h4>Inventory: ${schoolName}</h4>`;
            courses.forEach(c => {
                // Check if we have a score
                let badge = "Pending Analysis";
                if (c.skills) {
                    const avg = (Object.values(c.skills).reduce((a,b)=>a+b,0)/6).toFixed(1);
                    badge = `Impact Score: ${avg}`;
                }

                list.insertAdjacentHTML('beforeend', `
                    <div class="course-item">
                        <details>
                            <summary><span>${c.course}</span><span class="course-score-badge">${badge}</span></summary>
                            <div class="course-details">${c.description || "No description available."}</div>
                        </details>
                    </div>
                `);
            });
        }

        function removeSchool(schoolId) {
            selectedSchools = selectedSchools.filter(s => s.id !== schoolId);
            myChart.data.datasets = myChart.data.datasets.filter(ds => ds.id !== schoolId);
            updateTags();
            myChart.update();
        }

        function updateTags() {
            const container = document.getElementById('schoolTags');
            container.innerHTML = "";
            selectedSchools.forEach(s => {
                container.insertAdjacentHTML('beforeend', 
                    `<div class="school-tag"><div class="color-box" style="background:${s.color}" onclick="removeSchool('${s.id}')"></div> ${s.name}</div>`
                );
            });
        }
    </script>
</body>
</html>
