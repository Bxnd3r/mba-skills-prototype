<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Skills Gap Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; padding: 40px; }
        .container { width: 100%; max-width: 800px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; }
        select { padding: 12px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; background-color: #fff; cursor: pointer; transition: all 0.2s; }
        select:hover { border-color: #007bff; }
        .chart-wrapper { position: relative; padding: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎓 MBA Skills Gap Analyzer</h2>
        <p class="subtitle">Comparing program curricula against the 2025 Market Demand Baseline</p>
        
        <div class="controls">
            <select id="schoolSelect" onchange="updateChart()">
                <option value="stuart">IIT Stuart (Finance Focus)</option>
                <option value="booth">Chicago Booth (Econ Focus)</option>
                <option value="kellogg">Northwestern Kellogg (Marketing Focus)</option>
            </select>
        </div>

        <div class="chart-wrapper">
            <canvas id="myRadarChart"></canvas>
        </div>
    </div>

    <script>
        // 1. DATA LIBRARY (Pillars: Digital, Quant, Strategy, Management, Communication, Regulation)
        const labels = ['Digital', 'Quant', 'Strategy', 'Management', 'Communication', 'Regulation'];
        
        // Baseline derived from top market skillsets identified in Boshkoska (2025) [cite: 435, 436]
        const marketBaseline = [5, 4, 5, 4, 5, 3]; 

        const dataLibrary = {
            stuart: {
                label: "IIT Stuart MBA",
                data: [1.8, 2.3, 3.2, 2.2, 2.1, 1.9], // ADDED MISSING COMMA HERE
                color: 'rgba(54, 162, 235, 0.2)',
                borderColor: 'rgba(54, 162, 235, 1)'
            },
            booth: {
                label: "Chicago Booth MBA",
                data: [4, 5, 4, 3, 3, 3], 
                color: 'rgba(255, 159, 64, 0.2)',
                borderColor: 'rgba(255, 159, 64, 1)'
            },
            kellogg: {
                label: "Kellogg MBA",
                data: [3, 3, 5, 5, 5, 2], 
                color: 'rgba(75, 192, 192, 0.2)',
                borderColor: 'rgba(75, 192, 192, 1)'
            }
        };

        // 2. INITIALIZE CHART
        const ctx = document.getElementById('myRadarChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: dataLibrary.stuart.label,
                        data: dataLibrary.stuart.data,
                        backgroundColor: dataLibrary.stuart.color,
                        borderColor: dataLibrary.stuart.borderColor,
                        pointBackgroundColor: dataLibrary.stuart.borderColor,
                        pointHoverRadius: 10, 
                        fill: true
                    },
                    {
                        label: 'Market Demand Baseline (2025)',
                        data: marketBaseline,
                        backgroundColor: 'rgba(255, 99, 132, 0.05)',
                        borderColor: 'rgba(255, 99, 132, 0.4)',
                        borderDash: [5, 5], 
                        pointRadius: 0, 
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    r: {
                        suggestedMin: 0,
                        suggestedMax: 5,
                        ticks: { display: false }, 
                        pointLabels: { font: { size: 13, weight: 'bold' } }
                    }
                },
                animation: {
                    duration: 1000,
                    easing: 'easeOutElastic' 
                }
            }
        });

        // 3. UPDATE FUNCTION
        function updateChart() {
            const selectedSchool = document.getElementById('schoolSelect').value;
            const newData = dataLibrary[selectedSchool];

            myChart.data.datasets[0].label = newData.label;
            myChart.data.datasets[0].data = newData.data;
            myChart.data.datasets[0].backgroundColor = newData.color;
            myChart.data.datasets[0].borderColor = newData.borderColor;
            myChart.data.datasets[0].pointBackgroundColor = newData.borderColor;

            myChart.update();
        }
    </script>
</body>
</html>
