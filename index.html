<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Skills Gap Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 10px; }
        h2 { text-align: center; color: #1a1a1a; margin-top: 0; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
        .controls { display: flex; justify-content: center; margin-bottom: 20px; }
        select { padding: 12px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background-color: #fff; }
        .chart-wrapper { position: relative; height: 450px; width: 100%; }
        .insight-section { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .strength { background-color: #e6f4ea; border-left: 5px solid #34a853; }
        .gap { background-color: #fce8e6; border-left: 5px solid #ea4335; }
        h3 { margin-top: 0; font-size: 16px; }
        ul { padding-left: 18px; margin-bottom: 0; }
        li { margin-bottom: 6px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>MBA Skills Gap Analyzer</h2>
        <p class="subtitle">Boshkoska Framework: Curriculum vs. 2025 Market Significance</p>
        
        <div class="controls">
            <select id="schoolSelect" onchange="updateChart()">
                <option value="stuart">Illinois Institute of Technology: Stuart School of Business</option>
                <option value="booth">University of Chicago: Booth School of Business</option>
                <option value="kellogg">Northwestern University: Kellogg School of Management</option>
            </select>
        </div>

        <div class="chart-wrapper">
            <canvas id="myRadarChart"></canvas>
        </div>

        <div class="insight-section">
            <div class="card strength">
                <h3>Competitive Strengths</h3>
                <ul id="strengthsList"></ul>
            </div>
            <div class="card gap">
                <h3>Critical Skill Gaps</h3>
                <ul id="gapsList"></ul>
            </div>
        </div>
    </div>

    <script>
        const labels = ['Digital', 'Quant', 'Strategy', 'Management', 'Communication', 'Regulation'];
        
        // Boshkoska Significance Scaling (Normalized to 1-5) [cite: 435, 436]
        const marketBaseline = [3.5, 4.8, 4.0, 5.0, 4.5, 4.2]; 

        const dataLibrary = {
            stuart: {
                label: "Illinois Institute of Technology: Stuart School of Business",
                data: [1.8, 2.3, 3.2, 2.2, 2.1, 1.9], 
                color: 'rgba(54, 162, 235, 0.2)',
                borderColor: 'rgba(54, 162, 235, 1)'
            },
            booth: {
                label: "University of Chicago: Booth School of Business",
                data: [4, 5, 4, 3, 3, 3], 
                color: 'rgba(255, 159, 64, 0.2)',
                borderColor: 'rgba(255, 159, 64, 1)'
            },
            kellogg: {
                label: "Northwestern University: Kellogg School of Management",
                data: [3, 3, 5, 5, 5, 2], 
                color: 'rgba(75, 192, 192, 0.2)',
                borderColor: 'rgba(75, 192, 192, 1)'
            }
        };

        const ctx = document.getElementById('myRadarChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: dataLibrary.stuart.label,
                        data: dataLibrary.stuart.data,
                        backgroundColor: dataLibrary.stuart.color,
                        borderColor: dataLibrary.stuart.borderColor,
                        pointBackgroundColor: dataLibrary.stuart.borderColor,
                        pointRadius: 5,
                        pointHoverRadius: 12,
                        pointHitRadius: 25, // INCREASED SENSITIVITY RADIUS
                        fill: true
                    },
                    {
                        label: 'Market Demand Baseline (2025)',
                        data: marketBaseline,
                        backgroundColor: 'rgba(255, 99, 132, 0.05)',
                        borderColor: 'rgba(255, 99, 132, 0.4)',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: true
                    }
                ]
            },
            options: {
                maintainAspectRatio: false, // HELPS WITH VERTICAL ALIGNMENT
                scales: { 
                    r: { 
                        suggestedMin: 0, 
                        suggestedMax: 5, 
                        ticks: { display: false },
                        pointLabels: { font: { size: 13, weight: 'bold' } }
                    } 
                },
                plugins: {
                    legend: { position: 'top', labels: { boxWidth: 20 } }
                }
            }
        });

        function generateInsights() {
            const schoolData = myChart.data.datasets[0].data;
            const sList = document.getElementById('strengthsList');
            const gList = document.getElementById('gapsList');
            
            sList.innerHTML = "";
            gList.innerHTML = "";

            labels.forEach((label, i) => {
                const diff = schoolData[i] - marketBaseline[i];
                const li = document.createElement('li');
                
                if (diff >= -0.5) {
                    li.innerText = `${label}: Meeting/Exceeding Demand`;
                    sList.appendChild(li);
                } else {
                    li.innerText = `${label}: Market Gap Detected (-${Math.abs(diff).toFixed(1)})`;
                    gList.appendChild(li);
                }
            });
        }

        function updateChart() {
            const selectedKey = document.getElementById('schoolSelect').value;
            const newData = dataLibrary[selectedKey];

            myChart.data.datasets[0].label = newData.label;
            myChart.data.datasets[0].data = newData.data;
            myChart.data.datasets[0].backgroundColor = newData.color;
            myChart.data.datasets[0].borderColor = newData.borderColor;
            myChart.data.datasets[0].pointBackgroundColor = newData.borderColor;

            myChart.update();
            generateInsights();
        }

        generateInsights();
    </script>
</body>
</html>
